<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Acureatus AI Advanced Physio Pain Clinic</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F5F7FA;color:#1a1a2e;padding:1.5rem}
    .dark body{background:#0f1729;color:#e2e8f0}
    .container{text-align:center;max-width:28rem}
    .icon{width:5rem;height:5rem;margin:0 auto 1.5rem;border-radius:50%;background:#002B5B;display:flex;align-items:center;justify-content:center}
    .icon svg{width:2.5rem;height:2.5rem;color:#fff}
    h1{font-size:1.75rem;font-weight:700;margin-bottom:.75rem;color:#002B5B}
    .dark h1{color:#60a5fa}
    p{color:#64748b;margin-bottom:1.5rem;line-height:1.6}
    .actions{display:flex;flex-direction:column;gap:.75rem;align-items:center}
    @media(min-width:480px){.actions{flex-direction:row;justify-content:center}}
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;border-radius:.75rem;font-weight:600;font-size:.9rem;text-decoration:none;transition:all .2s}
    .btn-primary{background:#002B5B;color:#fff}
    .btn-primary:hover{background:#003d7a}
    .btn-secondary{border:1px solid #cbd5e1;color:#1a1a2e;background:transparent}
    .btn-secondary:hover{background:#e2e8f0}
    .dark .btn-secondary{border-color:#334155;color:#e2e8f0}
    .dark .btn-secondary:hover{background:#1e293b}
    .pulse{animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
    .status{margin-top:2rem;font-size:.8rem;color:#94a3b8}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon pulse">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072M15.536 8.464a5 5 0 010 7.072M12 12h.01" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — previously visited pages may still be available.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary" onclick="window.location.reload();return false;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
        Try Again
      </a>
      <a href="tel:+917996217888" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>
        Call Us
      </a>
    </div>
    <p class="status">Acureatus AI Advanced Physio Pain Clinic — Mangaluru</p>
  </div>
  <script>
    // Auto-retry when connection comes back
    window.addEventListener('online', () => window.location.reload());
    // Respect dark mode
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</body>
</html>
